# Harbormaster LiteLLM config.
#
# Routes local inference through Ember (primary) with Modal serverless
# fallback. Fallback fires on 5xx/timeout from the primary.
#
# References:
#   - https://docs.litellm.ai/docs/proxy/reliability  (fallbacks + retries)

model_list:
  # ===========================================================================
  # Chat — Qwen 3.5 4B
  # ===========================================================================
  - model_name: unsloth/qwen3.5-4b
    litellm_params:
      model: openai/unsloth/qwen3.5-4b
      api_base: https://ember.tail8bd569.ts.net/v1
      api_key: "EMPTY"
      timeout: 30
      max_retries: 0           # fail fast on primary; retry budget lives on fallback

  - model_name: unsloth/qwen3.5-4b-modal
    litellm_params:
      model: openai/unsloth/qwen3.5-4b
      api_base: https://jefferyharrell--pondside-qwen-serve.modal.run/v1
      api_key: "EMPTY"
      # Modal cold-start grace: llama-server opens port before loading weights,
      # returning 503 "Loading model" for 5-15s. Retry absorbs that window.
      num_retries: 3
      timeout: 60

  # ===========================================================================
  # Chat — Gemma 3 12B Instruct
  # ===========================================================================
  - model_name: gemma-3-12b-it
    litellm_params:
      model: openai/gemma-3-12b-it
      api_base: https://ember.tail8bd569.ts.net/v1
      api_key: "EMPTY"
      timeout: 30
      max_retries: 0           # fail fast on primary; retry budget lives on fallback

  - model_name: gemma-3-12b-it-modal
    litellm_params:
      model: openai/gemma-3-12b-it
      api_base: https://jefferyharrell--pondside-gemma-serve.modal.run/v1
      api_key: "EMPTY"
      num_retries: 3
      timeout: 60

  # ===========================================================================
  # Embedding — Qwen 3 Embedding 4B
  # ===========================================================================
  - model_name: text-embedding-qwen3-embedding-4b
    litellm_params:
      model: openai/text-embedding-qwen3-embedding-4b
      api_base: https://ember.tail8bd569.ts.net/v1
      api_key: "EMPTY"
      timeout: 30
      max_retries: 0           # fail fast on primary; retry budget lives on fallback

  - model_name: text-embedding-qwen3-embedding-4b-modal
    litellm_params:
      model: openai/text-embedding-qwen3-embedding-4b
      api_base: https://jefferyharrell--pondside-qwen-embedding-serve.modal.run/v1
      api_key: "EMPTY"
      num_retries: 3
      timeout: 60

  # ===========================================================================
  # Embedding — nomic-embed-text v1.5
  # ===========================================================================
  - model_name: text-embedding-nomic-embed-text-v1.5
    litellm_params:
      model: openai/text-embedding-nomic-embed-text-v1.5
      api_base: https://ember.tail8bd569.ts.net/v1
      api_key: "EMPTY"
      timeout: 30
      max_retries: 0           # fail fast on primary; retry budget lives on fallback

  - model_name: text-embedding-nomic-embed-text-v1.5-modal
    litellm_params:
      model: openai/text-embedding-nomic-embed-text-v1.5
      api_base: https://jefferyharrell--pondside-nomic-embedding-serve.modal.run/v1
      api_key: "EMPTY"
      num_retries: 3
      timeout: 60

# ===========================================================================
# Proxy-level settings
# ===========================================================================
litellm_settings:
  drop_params: true          # strip unsupported params rather than erroring
  request_timeout: 600
  master_key: os.environ/LITELLM_MASTER_KEY

  # Primary → fallback mapping. When the primary returns 5xx/timeout,
  # LiteLLM routes the same request to the fallback model.
  fallbacks:
    - unsloth/qwen3.5-4b: ["unsloth/qwen3.5-4b-modal"]
    - gemma-3-12b-it: ["gemma-3-12b-it-modal"]
    - text-embedding-qwen3-embedding-4b: ["text-embedding-qwen3-embedding-4b-modal"]
    - text-embedding-nomic-embed-text-v1.5: ["text-embedding-nomic-embed-text-v1.5-modal"]

  num_retries: 2             # primary-layer retry budget (0 on primary deployments means
                             # these go straight to fallback; fallback deployment retries
                             # absorb Modal cold-start)

# ===========================================================================
# Router settings — cooldown / circuit-breaker behavior
# ===========================================================================
# When the primary is persistently down, we don't want to pay the
# "try-Ember-first" tax on every request. LiteLLM removes a deployment
# from routing for `cooldown_time` after `allowed_fails` failures in a
# one-minute window. During cooldown, requests skip straight to fallback.
router_settings:
  allowed_fails: 1           # one failure benches the primary
  cooldown_time: 120         # primary stays benched for 2 minutes

# ===========================================================================
# General settings — background health checks
# ===========================================================================
# Proactive: every `health_check_interval` seconds, LiteLLM probes each
# deployment. Unhealthy deployments are removed from routing BEFORE a
# user request hits them. Healthy deployments are added back automatically.
general_settings:
  background_health_checks: false
  health_check_interval: 30
  enable_health_check_routing: true
  health_check_ignore_transient_errors: true

  # Postgres backend — enables the admin UI (/ui), virtual keys, spend
  # tracking, and request logs. DATABASE_URL is set via compose.yml.
  database_url: os.environ/DATABASE_URL

  store_model_in_db: true
  store_prompts_in_spend_logs: true
  forward_client_headers_to_llm_api: true