# Harbormaster — LiteLLM proxy with Tailscale sidecar.
#
# Serves at https://api.tail8bd569.ts.net (Let's Encrypt via Tailscale Serve).
# Routes local inference: Ember primary, Modal serverless fallback.
#
# Identity persistence:
#   - TS_AUTHKEY is used only on FIRST boot, or during disaster recovery.
#   - TS_AUTH_ONCE=true means the daemon skips re-auth when state is present.
#   - Persistent tailscale-state volume preserves the machine/node keys.
#   - After first boot, go to Tailscale admin → Machines → api → "Disable
#     key expiry". After that, TS_AUTHKEY can expire harmlessly — the
#     machine identity persists until the volume is lost.

services:
  tailscale:
    image: ghcr.io/tailscale/tailscale:latest
    container_name: harbormaster-tailscale
    hostname: api  # becomes api.tail8bd569.ts.net on the tailnet
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}          # used only on first boot; dormant thereafter
      TS_HOSTNAME: api
      TS_STATE_DIR: /var/lib/tailscale
      TS_AUTH_ONCE: "true"
      TS_USERSPACE: "false"
      TS_SERVE_CONFIG: /config/serve-config.json
      TS_EXTRA_ARGS: ${TS_EXTRA_ARGS:-}
    volumes:
      - ./tailscale-state:/var/lib/tailscale
      - ./serve-config.json:/config/serve-config.json:ro
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: harbormaster-litellm
    # Share the Tailscale sidecar's network namespace — no direct host-port
    # exposure. External access is via api.tail8bd569.ts.net:443 (HTTPS),
    # terminated by Tailscale Serve and forwarded to localhost:4000 inside
    # the shared network namespace.
    network_mode: service:tailscale
    depends_on:
      tailscale:
        condition: service_started
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    working_dir: /app
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
    restart: unless-stopped
